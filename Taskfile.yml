#       - taskfile quadlet generate --env-file .env.prod
#       - taskfile --env prod quadlet upload
#
#    c) Add CI/CD tasks for GitHub Actions/GitLab CI:
#       - Use --var TAG=$CI_COMMIT_SHA for versioning
#
#    d) Add task dependencies (deps: [test, build]) for complex workflows
#
#    e) Add conditional tasks with 'condition' for idempotency
#
# 5. USAGE EXAMPLES:
#
#    taskfile list                      # Show all tasks
