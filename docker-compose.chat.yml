# ============================================================================
# CoreSkill Demo — Docker Compose
# ============================================================================
# Usage:
#   docker compose -f docker-compose.chat.yml up              # Web mode (open http://localhost:3000)
#   docker compose -f docker-compose.chat.yml up --build      # Rebuild & start
#
# Desktop mode:
#   docker compose -f docker-compose.chat.yml up -d
#   Then run: ./desktop/run.sh     # Opens native window via webview
#
# Note: Uses local Ollama installation (not Docker containers)
#       Backend connects via host.docker.internal:11434
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # Backend API — FastAPI + WebSocket chat server
  # --------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: coreskill-api
    ports:
      - "8001:8000"  # Host:8001 → Container:8000
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - CORESKILL_MODE=demo
      - PYTHONUNBUFFERED=1
    volumes:
      - coreskill-data:/app/data
      - coreskill-logs:/app/logs
      - ./.evo_state.json:/app/.evo_state.json:ro
      - ./cores:/app/cores:ro
      - ./backend/main.py:/app/main.py:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - coreskill-net

  # --------------------------------------------------------------------------
  # Frontend — Nginx serving static chat UI
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coreskill-ui
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - coreskill-net

  # --------------------------------------------------------------------------
  # Note: Ollama usługi usunięte - użyj lokalnej instalacji Ollama
  # Backend łączy się przez host.docker.internal:11434
  # --------------------------------------------------------------------------

volumes:
  coreskill-data:
  coreskill-logs:

networks:
  coreskill-net:
    driver: bridge
