# ============================================================================
# CoreSkill Demo — Docker Compose
# ============================================================================
# Usage:
#   docker compose -f docker-compose.chat.yml up              # Web mode (open http://localhost:3000)
#   docker compose -f docker-compose.chat.yml up --build      # Rebuild & start
#   docker compose -f docker-compose.chat.yml --profile gpu up  # With GPU support for Ollama
#
# Desktop mode:
#   docker compose -f docker-compose.chat.yml up -d
#   Then run: ./desktop/run.sh     # Opens native window via webview
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # Backend API — FastAPI + WebSocket chat server
  # --------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coreskill-api
    ports:
      - "8001:8000"  # Host:8001 → Container:8000
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - CORESKILL_MODE=demo
      - PYTHONUNBUFFERED=1
    volumes:
      - coreskill-data:/app/data
      - coreskill-logs:/app/logs
      - ./.evo_state.json:/app/.evo_state.json:ro
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - coreskill-net

  # --------------------------------------------------------------------------
  # Frontend — Nginx serving static chat UI
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coreskill-ui
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - coreskill-net

  # --------------------------------------------------------------------------
  # Ollama — Local LLM inference (optional, for offline mode)
  # --------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: coreskill-ollama
    # Port 11434 not exposed on host - only internal network access
    # (backend connects via http://ollama:11434)
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped
    networks:
      - coreskill-net

  # --------------------------------------------------------------------------
  # Ollama GPU variant (use with --profile gpu)
  # --------------------------------------------------------------------------
  ollama-gpu:
    image: ollama/ollama:latest
    container_name: coreskill-ollama-gpu
    profiles: ["gpu"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - coreskill-net

volumes:
  coreskill-data:
  coreskill-logs:
  ollama-models:

networks:
  coreskill-net:
    driver: bridge
