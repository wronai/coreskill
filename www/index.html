<!DOCTYPE html>
<html lang="pl">

                onClick: () => setTab(t.id),
                style: {
                  padding: "8px 16px",
                  borderRadius: 8,
                  border: "none",
                  background: tab === t.id ? "#ef4444" : "#27272a",
                  color: "white",
                  fontSize: 14,
                  fontWeight: 600,
                  cursor: "pointer",
                  whiteSpace: "nowrap"
                }
              }, t.label)

              React.createElement('h2', { style: { fontSize: 20, fontWeight: 700, margin: "0 0 16px 0" } }, "🚀 Szybkie zwycięstwa (7 dni)"),
              React.createElement('div', { style: { display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))", gap: 16 } },

                    phase.items.map((item, i) =>
                      React.createElement('div', {

                        style: {
                          background: "#1e1e1e",

              ),
              React.createElement('div', {
                style: {
                  marginTop: 24,
                  padding: 20,
                  background: "#18181b",
                  borderRadius: 12,
                  border: "1px solid #f59e0b33"
                }
              },
                React.createElement('h4', {
                  style: { fontSize: 14, fontWeight: 700, margin: "0 0 12px 0", color: "#fbbf24" }

                techStack.map((item, i) =>
                  React.createElement('div', {
                    key: i,
                    style: {
                      background: "#27272a",
                      padding: 20,
                      borderRadius: 12,
                      border: "1px solid #3f3f46",
                      display: "grid",
                      gridTemplateColumns: "150px 1fr",
                      gap: 20,
                      alignItems: "start"

                    React.createElement('div', null,

                      React.createElement('div', { style: { fontSize: 16, fontWeight: 700, color: "#fbbf24" } }, item.rec)

        const root = ReactDOM.createRoot(document.getElementById('root'));
