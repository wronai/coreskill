version: "3.9"

# ============================================================================
# CoreSkill Demo — Docker Compose
# ============================================================================
# Usage:
#   docker compose up              # Web mode (open http://localhost:3000)
#   docker compose up --build      # Rebuild & start
#   docker compose --profile gpu up  # With GPU support for Ollama
#
# Desktop mode:
#   docker compose up -d
#   Then run: ./desktop/run.sh     # Opens native window via webview
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # Backend API — FastAPI + WebSocket chat server
  # --------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coreskill-api
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OLLAMA_HOST=http://ollama:11434
      - CORESKILL_MODE=demo
      - PYTHONUNBUFFERED=1
    volumes:
      - coreskill-data:/app/data
      - coreskill-logs:/app/logs
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - coreskill-net

  # --------------------------------------------------------------------------
  # Frontend — Nginx serving static chat UI
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coreskill-ui
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - coreskill-net

  # --------------------------------------------------------------------------
  # Ollama — Local LLM inference (optional, for offline mode)
  # --------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: coreskill-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped
    networks:
      - coreskill-net
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # --------------------------------------------------------------------------
  # Ollama GPU variant (use with --profile gpu)
  # --------------------------------------------------------------------------
  ollama-gpu:
    image: ollama/ollama:latest
    container_name: coreskill-ollama-gpu
    profiles: ["gpu"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - coreskill-net

volumes:
  coreskill-data:
  coreskill-logs:
  ollama-models:

networks:
  coreskill-net:
    driver: bridge
