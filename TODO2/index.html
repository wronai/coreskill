<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CoreSkill — AI Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ================================================================
   CoreSkill Chat UI — Dark terminal aesthetic with warm accents
   ================================================================ */
:root {
  --bg-deep: #0a0a0f;
  --bg-surface: #12121a;
  --bg-elevated: #1a1a26;
  --bg-hover: #222233;
  --border: #2a2a3a;
  --text-primary: #e8e6e3;
  --text-secondary: #8888a0;
  --text-muted: #555570;
  --accent: #ff6b35;
  --accent-dim: #ff6b3520;
  --accent-glow: #ff6b3540;
  --green: #4ade80;
  --green-dim: #4ade8020;
  --blue: #60a5fa;
  --red: #f87171;
  --yellow: #fbbf24;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Plus Jakarta Sans', -apple-system, sans-serif;
  --radius: 12px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%; overflow: hidden;
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
}

/* ---- Layout ---- */
.app {
  display: grid;
  grid-template-rows: 56px 1fr auto;
  height: 100vh;
  max-width: 900px;
  margin: 0 auto;
}

/* ---- Header ---- */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-surface);
  backdrop-filter: blur(12px);
  z-index: 10;
}

.header-left { display: flex; align-items: center; gap: 12px; }

.logo {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--accent), #ff8f65);
  border-radius: 8px;
  display: grid; place-items: center;
  font-size: 16px; font-weight: 700;
  color: #fff;
  box-shadow: 0 0 20px var(--accent-glow);
}

.header h1 {
  font-size: 15px; font-weight: 600;
  letter-spacing: -0.02em;
}

.header h1 span { color: var(--text-muted); font-weight: 400; margin-left: 6px; font-size: 12px; }

.header-right { display: flex; align-items: center; gap: 8px; }

.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green-dim);
  animation: pulse 2s infinite;
}
.status-dot.offline { background: var(--red); box-shadow: none; animation: none; }
.status-dot.connecting { background: var(--yellow); animation: pulse 1s infinite; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.provider-badge {
  font-family: var(--mono); font-size: 11px;
  color: var(--text-muted);
  background: var(--bg-elevated);
  padding: 3px 8px; border-radius: 4px;
  border: 1px solid var(--border);
}

.btn-icon {
  width: 36px; height: 36px;
  background: transparent; border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  cursor: pointer; display: grid; place-items: center;
  font-size: 16px;
  transition: all 0.15s;
}
.btn-icon:hover { background: var(--bg-hover); color: var(--text-primary); }
.btn-icon.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

/* ---- Messages ---- */
.messages {
  overflow-y: auto; padding: 20px;
  display: flex; flex-direction: column; gap: 16px;
  scroll-behavior: smooth;
}

.messages::-webkit-scrollbar { width: 6px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.msg {
  display: flex; gap: 12px;
  max-width: 85%;
  animation: msgIn 0.3s ease;
}
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.system { align-self: center; max-width: 95%; }

@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg-avatar {
  width: 32px; height: 32px; border-radius: 8px;
  flex-shrink: 0;
  display: grid; place-items: center;
  font-size: 14px;
}
.msg.assistant .msg-avatar { background: var(--accent-dim); color: var(--accent); }
.msg.user .msg-avatar { background: var(--bg-elevated); color: var(--blue); }

.msg-body {
  padding: 12px 16px;
  border-radius: var(--radius);
  line-height: 1.6;
  font-size: 14px;
}
.msg.assistant .msg-body {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-top-left-radius: 4px;
}
.msg.user .msg-body {
  background: var(--accent-dim);
  border: 1px solid var(--accent)30;
  border-top-right-radius: 4px;
  color: var(--text-primary);
}
.msg.system .msg-body {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  text-align: center;
  font-size: 12px; color: var(--text-muted);
  padding: 8px 16px;
  border-radius: 20px;
}

.msg-body p { margin-bottom: 8px; }
.msg-body p:last-child { margin-bottom: 0; }
.msg-body code {
  font-family: var(--mono); font-size: 12px;
  background: var(--bg-deep); padding: 2px 6px;
  border-radius: 4px; color: var(--green);
}
.msg-body pre {
  background: var(--bg-deep); padding: 12px;
  border-radius: var(--radius-sm);
  overflow-x: auto; margin: 8px 0;
  border: 1px solid var(--border);
}
.msg-body pre code {
  background: none; padding: 0;
  font-size: 12px; line-height: 1.5;
}
.msg-body strong { color: var(--accent); font-weight: 600; }
.msg-body em { color: var(--text-secondary); }
.msg-body h2 { font-size: 15px; margin: 12px 0 6px; color: var(--accent); }
.msg-body ul, .msg-body ol { padding-left: 20px; margin: 6px 0; }
.msg-body li { margin: 3px 0; }
.msg-body table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 13px; }
.msg-body th, .msg-body td { padding: 6px 10px; border: 1px solid var(--border); text-align: left; }
.msg-body th { background: var(--bg-elevated); font-weight: 600; }

.typing-indicator {
  display: flex; gap: 5px; padding: 16px;
}
.typing-indicator span {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--text-muted);
  animation: typing 1.4s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing {
  0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
  30% { opacity: 1; transform: scale(1); }
}

/* ---- Input Area ---- */
.input-area {
  padding: 12px 20px 20px;
  border-top: 1px solid var(--border);
  background: var(--bg-surface);
}

.input-row {
  display: flex; gap: 8px; align-items: flex-end;
}

.input-wrapper {
  flex: 1; position: relative;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: border-color 0.2s;
}
.input-wrapper:focus-within { border-color: var(--accent); }

#chatInput {
  width: 100%;
  background: transparent;
  border: none; outline: none;
  padding: 12px 16px;
  color: var(--text-primary);
  font-family: var(--sans);
  font-size: 14px;
  resize: none;
  min-height: 44px;
  max-height: 120px;
  line-height: 1.5;
}
#chatInput::placeholder { color: var(--text-muted); }

.send-btn {
  width: 44px; height: 44px;
  background: var(--accent);
  border: none; border-radius: var(--radius);
  color: #fff; cursor: pointer;
  display: grid; place-items: center;
  font-size: 18px;
  transition: all 0.15s;
  flex-shrink: 0;
}
.send-btn:hover { filter: brightness(1.1); transform: scale(1.03); }
.send-btn:disabled { opacity: 0.3; cursor: default; transform: none; }

/* ---- Voice recording ---- */
.mic-btn {
  width: 44px; height: 44px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-secondary);
  cursor: pointer; display: grid; place-items: center;
  font-size: 18px;
  transition: all 0.15s;
  flex-shrink: 0;
}
.mic-btn:hover { border-color: var(--accent); color: var(--accent); }
.mic-btn.recording {
  background: var(--red);
  border-color: var(--red);
  color: #fff;
  animation: recPulse 1s infinite;
}
@keyframes recPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(248,113,113,0.4); }
  50% { box-shadow: 0 0 0 8px rgba(248,113,113,0); }
}

/* Voice mode bar */
.voice-bar {
  display: none;
  align-items: center; justify-content: center; gap: 12px;
  padding: 8px 16px;
  background: var(--accent-dim);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  font-size: 13px; color: var(--accent);
}
.voice-bar.active { display: flex; }

.voice-wave {
  display: flex; align-items: center; gap: 2px; height: 20px;
}
.voice-wave span {
  width: 3px; background: var(--accent);
  border-radius: 2px;
  animation: wave 0.8s ease-in-out infinite;
}
.voice-wave span:nth-child(1) { height: 8px; animation-delay: 0s; }
.voice-wave span:nth-child(2) { height: 16px; animation-delay: 0.1s; }
.voice-wave span:nth-child(3) { height: 10px; animation-delay: 0.2s; }
.voice-wave span:nth-child(4) { height: 18px; animation-delay: 0.3s; }
.voice-wave span:nth-child(5) { height: 6px; animation-delay: 0.4s; }
@keyframes wave {
  0%, 100% { transform: scaleY(0.5); }
  50% { transform: scaleY(1); }
}

/* ---- Sidebar / Info panel ---- */
.info-line {
  display: flex; gap: 12px; justify-content: center;
  padding: 6px 0; font-size: 11px; color: var(--text-muted);
  font-family: var(--mono);
}

/* ---- Mobile ---- */
@media (max-width: 640px) {
  .app { max-width: 100%; }
  .msg { max-width: 92%; }
  .header h1 span { display: none; }
}
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo">CS</div>
      <h1>CoreSkill <span>v2.0 demo</span></h1>
    </div>
    <div class="header-right">
      <span id="providerBadge" class="provider-badge">connecting...</span>
      <div id="statusDot" class="status-dot connecting"></div>
      <button class="btn-icon" id="voiceToggle" title="Tryb głosowy (STT/TTS)">🎤</button>
      <button class="btn-icon" id="ttsToggle" title="Auto-TTS odpowiedzi">🔊</button>
    </div>
  </header>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Input -->
  <div class="input-area">
    <div class="voice-bar" id="voiceBar">
      <div class="voice-wave"><span></span><span></span><span></span><span></span><span></span></div>
      <span id="voiceStatus">Nasłuchuję...</span>
    </div>
    <div class="input-row">
      <button class="mic-btn" id="micBtn" title="Naciśnij i mów">🎙️</button>
      <div class="input-wrapper">
        <textarea id="chatInput" rows="1" placeholder="Napisz wiadomość lub użyj mikrofonu..." autofocus></textarea>
      </div>
      <button class="send-btn" id="sendBtn" disabled>➤</button>
    </div>
    <div class="info-line">
      <span>⌨️ Enter = wyślij</span>
      <span>•</span>
      <span>🎤 Przytrzymaj = mów</span>
      <span>•</span>
      <span>/ = komendy</span>
    </div>
  </div>
</div>

<script>
/* ================================================================
   CoreSkill Chat Client
   - WebSocket real-time communication
   - Web Speech API for browser-native STT
   - Server-side STT (whisper) + TTS (edge-tts) fallback
   - Audio recording via MediaRecorder
   ================================================================ */
(() => {
  'use strict';

  // --- Elements ---
  const $messages  = document.getElementById('messages');
  const $input     = document.getElementById('chatInput');
  const $sendBtn   = document.getElementById('sendBtn');
  const $micBtn    = document.getElementById('micBtn');
  const $voiceBar  = document.getElementById('voiceBar');
  const $voiceStatus = document.getElementById('voiceStatus');
  const $voiceToggle = document.getElementById('voiceToggle');
  const $ttsToggle = document.getElementById('ttsToggle');
  const $statusDot = document.getElementById('statusDot');
  const $provider  = document.getElementById('providerBadge');

  // --- State ---
  let ws = null;
  let voiceMode = false;
  let autoTTS = false;
  let isRecording = false;
  let mediaRecorder = null;
  let audioChunks = [];
  let recognition = null; // Web Speech API
  let audioContext = null;

  // --- Markdown (lightweight) ---
  function md(text) {
    if (!text) return '';
    let html = text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      // code blocks
      .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
      // inline code
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      // headings
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      // bold/italic
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/_(.+?)_/g, '<em>$1</em>')
      // tables
      .replace(/^\|(.+)\|$/gm, (match) => {
        const cells = match.split('|').filter(c => c.trim());
        if (cells.every(c => /^[\s-:]+$/.test(c))) return '';
        const tag = match.includes('---') ? 'th' : 'td';
        return '<tr>' + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('') + '</tr>';
      })
      // list items
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      // paragraphs
      .replace(/\n{2,}/g, '</p><p>')
      .replace(/\n/g, '<br>');

    // Wrap tables
    html = html.replace(/(<tr>[\s\S]*?<\/tr>)/g, '<table>$1</table>');
    // Wrap list items
    html = html.replace(/(<li>[\s\S]*?<\/li>)+/g, '<ul>$&</ul>');

    return `<p>${html}</p>`;
  }

  // --- Add message to UI ---
  function addMessage(role, content, extra = {}) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'assistant' ? '🤖' : role === 'user' ? '👤' : '⚙️';

    const body = document.createElement('div');
    body.className = 'msg-body';
    body.innerHTML = md(content);

    div.appendChild(avatar);
    div.appendChild(body);
    $messages.appendChild(div);
    $messages.scrollTop = $messages.scrollHeight;
    return div;
  }

  let typingEl = null;
  function showTyping() {
    if (typingEl) return;
    typingEl = document.createElement('div');
    typingEl.className = 'msg assistant';
    typingEl.innerHTML = `
      <div class="msg-avatar">🤖</div>
      <div class="msg-body"><div class="typing-indicator"><span></span><span></span><span></span></div></div>
    `;
    $messages.appendChild(typingEl);
    $messages.scrollTop = $messages.scrollHeight;
  }
  function hideTyping() {
    if (typingEl) { typingEl.remove(); typingEl = null; }
  }

  // --- WebSocket ---
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const wsUrl = `${proto}://${location.host}/ws/chat`;

    $statusDot.className = 'status-dot connecting';
    $provider.textContent = 'connecting...';

    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      $statusDot.className = 'status-dot';
      $provider.textContent = 'connected';
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);

      switch (msg.type) {
        case 'system':
          addMessage('system', msg.content);
          if (msg.provider) $provider.textContent = msg.provider || 'auto';
          break;

        case 'typing':
          msg.content ? showTyping() : hideTyping();
          break;

        case 'message':
          hideTyping();
          addMessage(msg.role || 'assistant', msg.content);
          if (msg.provider) $provider.textContent = msg.provider;

          // Auto-TTS
          if (autoTTS && msg.role === 'assistant') {
            playTTS(msg.content);
          }
          break;

        case 'stt_result':
          addMessage('system', `🎤 Rozpoznano: "${msg.content}"`);
          break;

        case 'tts_audio':
          playAudioBase64(msg.audio);
          break;
      }
    };

    ws.onclose = () => {
      $statusDot.className = 'status-dot offline';
      $provider.textContent = 'offline';
      setTimeout(connect, 3000);
    };

    ws.onerror = () => {
      $statusDot.className = 'status-dot offline';
    };
  }

  // --- Send message ---
  function send() {
    const text = $input.value.trim();
    if (!text || !ws || ws.readyState !== 1) return;

    addMessage('user', text);
    ws.send(JSON.stringify({
      type: 'text',
      content: text,
      voice_mode: autoTTS,
    }));

    $input.value = '';
    $input.style.height = 'auto';
    $sendBtn.disabled = true;
  }

  // --- Audio playback ---
  function playAudioBase64(b64) {
    const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const blob = new Blob([bytes], { type: 'audio/mpeg' });
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.play().catch(() => {});
    audio.onended = () => URL.revokeObjectURL(url);
  }

  async function playTTS(text) {
    // Use server-side TTS
    try {
      const clean = text.replace(/[*`#|_\[\]]/g, '').substring(0, 500);
      const resp = await fetch('/api/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: clean, lang: 'pl' }),
      });
      if (resp.ok) {
        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        audio.play().catch(() => {});
        audio.onended = () => URL.revokeObjectURL(url);
      }
    } catch (err) {
      console.warn('TTS failed, trying browser fallback:', err);
      // Browser TTS fallback
      if ('speechSynthesis' in window) {
        const u = new SpeechSynthesisUtterance(text.substring(0, 300));
        u.lang = 'pl-PL';
        speechSynthesis.speak(u);
      }
    }
  }

  // --- Browser STT (Web Speech API) ---
  function initBrowserSTT() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) return null;

    const rec = new SpeechRecognition();
    rec.lang = 'pl-PL';
    rec.continuous = false;
    rec.interimResults = true;

    rec.onresult = (e) => {
      const transcript = Array.from(e.results)
        .map(r => r[0].transcript).join('');
      $input.value = transcript;
      $sendBtn.disabled = !transcript.trim();

      // If final result, send
      if (e.results[e.results.length - 1].isFinal) {
        setTimeout(() => { if ($input.value.trim()) send(); }, 300);
      }
    };

    rec.onend = () => {
      isRecording = false;
      $micBtn.classList.remove('recording');
      $voiceBar.classList.remove('active');
    };

    rec.onerror = (e) => {
      console.warn('STT error:', e.error);
      isRecording = false;
      $micBtn.classList.remove('recording');
      $voiceBar.classList.remove('active');
      // Fallback: try server-side STT
      if (e.error === 'not-allowed' || e.error === 'service-not-available') {
        $voiceStatus.textContent = 'Browser STT niedostępne — używam serwera';
        startServerRecording();
      }
    };

    return rec;
  }

  // --- Server-side STT (MediaRecorder → whisper) ---
  async function startServerRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
      audioChunks = [];

      mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);

      mediaRecorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(audioChunks, { type: 'audio/webm' });

        // Convert to base64 and send via WebSocket
        const reader = new FileReader();
        reader.onload = () => {
          const b64 = reader.result.split(',')[1];
          if (ws && ws.readyState === 1) {
            ws.send(JSON.stringify({
              type: 'audio',
              audio: b64,
              lang: 'pl',
              voice_mode: autoTTS,
            }));
          }
        };
        reader.readAsDataURL(blob);
      };

      mediaRecorder.start();
      isRecording = true;
      $micBtn.classList.add('recording');
      $voiceBar.classList.add('active');
      $voiceStatus.textContent = 'Nagrywam... (puść aby wysłać)';
    } catch (err) {
      console.error('Cannot access microphone:', err);
      addMessage('system', '⚠️ Brak dostępu do mikrofonu. Sprawdź uprawnienia przeglądarki.');
    }
  }

  function stopServerRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
    }
    isRecording = false;
    $micBtn.classList.remove('recording');
    $voiceBar.classList.remove('active');
  }

  // --- Mic button (press & hold or toggle) ---
  recognition = initBrowserSTT();

  $micBtn.addEventListener('mousedown', (e) => {
    e.preventDefault();
    if (isRecording) {
      if (recognition) recognition.stop();
      else stopServerRecording();
      return;
    }
    if (recognition) {
      isRecording = true;
      $micBtn.classList.add('recording');
      $voiceBar.classList.add('active');
      $voiceStatus.textContent = 'Nasłuchuję...';
      recognition.start();
    } else {
      startServerRecording();
    }
  });

  $micBtn.addEventListener('mouseup', () => {
    // For hold-to-talk with server recording
    if (!recognition && isRecording) {
      setTimeout(stopServerRecording, 200);
    }
  });

  // Touch events for mobile
  $micBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    $micBtn.dispatchEvent(new Event('mousedown'));
  });
  $micBtn.addEventListener('touchend', (e) => {
    e.preventDefault();
    $micBtn.dispatchEvent(new Event('mouseup'));
  });

  // --- Voice toggle (continuous listening mode) ---
  $voiceToggle.addEventListener('click', () => {
    voiceMode = !voiceMode;
    $voiceToggle.classList.toggle('active', voiceMode);
    addMessage('system', voiceMode
      ? '🎤 Tryb głosowy włączony — kliknij mikrofon aby mówić'
      : '🎤 Tryb głosowy wyłączony');
  });

  // --- TTS toggle ---
  $ttsToggle.addEventListener('click', () => {
    autoTTS = !autoTTS;
    $ttsToggle.classList.toggle('active', autoTTS);
    addMessage('system', autoTTS
      ? '🔊 Auto-TTS włączony — odpowiedzi będą czytane głosowo'
      : '🔊 Auto-TTS wyłączony');
  });

  // --- Input handling ---
  $input.addEventListener('input', () => {
    $sendBtn.disabled = !$input.value.trim();
    $input.style.height = 'auto';
    $input.style.height = Math.min($input.scrollHeight, 120) + 'px';
  });

  $input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  $sendBtn.addEventListener('click', send);

  // --- Boot ---
  connect();

  // Welcome message
  setTimeout(() => {
    addMessage('assistant',
      '**Witaj w CoreSkill Demo!** 👋\n\n' +
      'Jestem ewolucyjnym asystentem AI z samonaprawiającymi się umiejętnościami.\n\n' +
      'Możesz:\n' +
      '- 💬 Pisać wiadomości tekstowe\n' +
      '- 🎤 Kliknąć mikrofon aby mówić (STT)\n' +
      '- 🔊 Włączyć auto-TTS (ikonka głośnika)\n' +
      '- ⌨️ Wpisać `/help` po listę komend\n' +
      '- ⌨️ Wpisać `/skills` aby zobaczyć moje umiejętności\n\n' +
      'Pytaj o cokolwiek — po polsku lub angielsku!'
    );
  }, 500);

})();
</script>
</body>
</html>
